<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>划词翻译插件设置</title><link rel="stylesheet" href="options.css"></head><body><main class="wrap"><section class="card"><div class="badge">GOFRUXA Translate</div><h1>插件账户设置</h1><p>使用 E-mail 注册或登录。百度 APP ID / Key 保存到云端后，PC Chrome 和 Android Kiwi 登录同一账户即可同步使用。</p><div id="message" class="message"></div><form id="authForm" class="form"><label>E-mail<input id="email" type="email" required></label><label>密码<input id="password" type="password" required minlength="8"></label><div class="row"><button data-action="login" type="submit">登录</button><button data-action="register" type="submit" class="ghost">注册</button></div></form><form id="credentialForm" class="form hidden"><div id="userStatus" class="status"></div><label>百度 APP ID<input id="appId" autocomplete="off"></label><label>百度 Key<input id="secretKey" type="password" autocomplete="off"></label><div class="row"><button type="submit">保存配置</button><button id="logoutBtn" type="button" class="ghost">退出登录</button></div></form></section></main><script src="options.js"></script></body></html>
